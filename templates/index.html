<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Higher or Lower</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .game-box { border: 1px solid #ccc; padding: 20px; display: inline-block; border-radius: 10px; background-color: #f9f9f9; }
        input[type="number"] { padding: 10px; font-size: 16px; width: 100px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #0078D4; color: white; border: none; border-radius: 5px; }
        button:hover { background-color: #005A9E; }
    </style>
</head>
<body>

    <div class="game-box">
        <h1>Higher or Lower</h1>
        
        <p><strong>{{ message }}</strong></p>

        <form method="POST">
            <input type="number" name="guess" placeholder="Enter your guess:" autofocus autocomplete="off">
            <button type="submit">Submit Guess</button>
        </form>
    </div>

</body>
</html>
