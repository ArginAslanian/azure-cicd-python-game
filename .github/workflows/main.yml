name: Build and Deploy Python App to Azure

# 1. The Trigger: When does this run?
on:
  push:
    branches:
      - main 

# 2. The Job: What are we doing?
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Download your code from your GitHub repo onto the temporary server
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Install Python on the server
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13' 

    # Step 3: Install your requirements (Flask and Gunicorn)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 4: Show the VIP Badge to Azure using the secret vault
    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # Step 5: Push the packaged code to your App Service
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'argin-higher-lower-game'
        package: .